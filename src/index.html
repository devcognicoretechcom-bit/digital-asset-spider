<!DOCTYPE html>
<html>
<head>
    <title>CogniCoreTech | Subscription Engine</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: 40px auto; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 10px; }
        button { cursor: pointer; padding: 10px; background: #00ff9d; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Select Your CogniCore Plan</h1>
    <div class="grid">
        <div class="card"><h3>Free</h3><button onclick="subscribe('free')">Select</button></div>
        <div class="card"><h3>Pro</h3><button onclick="subscribe('pro')">Select</button></div>
        <div class="card"><h3>Premium</h3><button onclick="subscribe('premium')">Select</button></div>
    </div>
    <p id="msg"></p>
    <script>
        async function subscribe(plan) {
            const email = prompt("Enter your corporate email:");
            if(!email) return;
            const res = await fetch('/api/v1/subscribe', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, plan })
            });
            const data = await res.json();
            document.getElementById('msg').innerText = data.message;
        }
    </script>
</body>
</html>
