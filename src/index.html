<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CogniCoreTech | Enterprise Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; text-align: center; padding: 100px 20px; }
        h1 { font-size: 3rem; color: #00ff9d; }
        input { padding: 10px; width: 250px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; background: #00ff9d; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>CogniCoreTech</h1>
    <p>Enterprise Digital Asset Intelligence.</p>
    <form id="accessForm">
        <input type="email" id="email" placeholder="Enter your corporate email" required>
        <button type="submit">Request Access</button>
    </form>
    <p id="responseMessage"></p>
    <script>
        document.getElementById('accessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const res = await fetch('/api/v1/request-access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            document.getElementById('responseMessage').innerText = data.message;
        });
    </script>
</body>
</html>
